<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Konfirmasi - SkyLine</title>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #c344e0; display: flex; justify-content: center; padding-top: 50px; }
        .success-card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 15px rgba(0,0,0,0.1); text-align: center; width: 400px; }
        .icon { font-size: 50px; color: #48bb78; margin-bottom: 20px; }
        .info-list { text-align: left; margin: 20px 0; background: #edf2f7; padding: 15px; border-radius: 8px; }
        .info-item { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; }
        .label { color: #718096; }
        .value { font-weight: bold; color: #2d3748; }
        .back-link { color: #c344e0; text-decoration: none; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="success-card">
        <div class="icon">✓</div>
        <h2 style="margin:0;">Pemesanan Berhasil!</h2>
        <p style="color:#718096;">Tiket elektronik telah dikirim ke email Anda.</p>
        
        <div class="info-list">
            <div class="info-item"><span class="label">Kode Booking</span><span class="value">SKY-882190</span></div>
            <div class="info-item"><span class="label">Maskapai</span><span class="value">SkyLine Airways</span></div>
            <div class="info-item"><span class="label">Status</span><span class="value" style="color:#48bb78;">Lunas</span></div>
        </div>

        <a href="form_tiket.html" class="back-link">← Kembali ke Beranda</a>
    </div>
</body>
</html>
