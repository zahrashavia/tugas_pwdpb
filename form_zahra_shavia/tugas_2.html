<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <title>Contoh Form Lengkap</title>
  <style>
    body { font-family: Arial; background: #f4f7fb; padding: 20px; }
    .form-group { margin-bottom: 15px; }
    label { font-weight: bold; display: block; margin-bottom: 5px; }
    input, select, textarea, button { padding: 6px; width: 100%; box-sizing: border-box; }
    input[type="checkbox"], input[type="radio"] { width: auto; }
  </style>
</head>
<body>
  <h2>Contoh Elemen Form</h2>
  <form method="post" action="#" enctype="multipart/form-data">
    
    <!-- File -->
    <div class="form-group">
      <label>Unggah Foto</label>
      <input type="file" name="dokumen">
    </div>

    <!-- Hidden -->
    <input type="hidden" name="id_user" value="12345">

    <!-- Password -->
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password">
    </div>

    <!-- Checkbox -->
    <div class="form-group">
      <label>Pilih Hobi</label>
      <input type="checkbox" name="hobi[]" value="Berenang"> Berenang
      <input type="checkbox" name="hobi[]" value="Bermain"> Bermain
      <input type="checkbox" name="hobi[]" value="Olahraga"> Olahraga    </div>

    <!-- Radio Button -->
    <div class="form-group">
      <label>Jenis Kelamin</label>
      <input type="radio" name="gender" value="L"> Laki-laki
      <input type="radio" name="gender" value="P"> Perempuan
    </div>

    <!-- Select -->
    <div class="form-group">
      <label>Pilih Kota</label>
      <select name="kota">
        <option value="pdg">Padang</option>
        <option value="slk">Solok</option>
        <option value="pknbr">Pekan Baru</option>
      </select>
    </div>

    <!-- Textarea -->
    <div class="form-group">
      <label>Alamat Lengkap</label>
      <textarea name="alamat" rows="4"></textarea>
    </div>

    <!-- Button biasa -->
    <div class="form-group">
      <input type="button" value="ahayy" onclick="alert('Tombol button ditekan!')">
    </div>

    <!-- Submit & Reset -->
    <div class="form-group">
      <input type="submit" value="Kirim Data">
      <input type="reset" value="Reset Form">
    </div>
  </form>
</body>
</html>
