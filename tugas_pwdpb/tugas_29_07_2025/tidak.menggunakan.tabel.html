<!DOCTYPE html>
<html>
<head>
  <title>Data Siswa - Tanpa Tabel</title>
  <style>
    .table-wrapper {
      display: grid;
      grid-template-columns: 1fr 2fr 1fr;
      width: 60%;
      margin: 20px auto;
      border: 1px solid #aaa;
    }
    .header, .cell {
      padding: 10px;
      border-bottom: 1px solid #aaa;
      border-right: 1px solid #aaa;
      text-align: center;
    }
    .header {
      background-color: #f2f2f2;
      font-weight: bold;
    }
    .table-wrapper > :nth-child(3n) {
      border-right: none;
    }
  </style>
</head>
<body>
  <h2 style="text-align:center;">Daftar Siswa (Tanpa Tag Tabel)</h2>
  <div class="table-wrapper">
    <div class="header">No</div>
    <div class="header">Nama</div>
    <div class="header">Kelas</div>

    <div class="cell">1</div>
    <div class="cell">Ani</div>
    <div class="cell">10A</div>

    <div class="cell">2</div>
    <div class="cell">Budi</div>
    <div class="cell">10B</div>

    <div class="cell">3</div>
    <div class="cell">Citra</div>
    <div class="cell">10C</div>
  </div>
</body>
</html>
