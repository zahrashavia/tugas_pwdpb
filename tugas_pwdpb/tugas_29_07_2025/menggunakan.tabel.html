<!DOCTYPE html>
<html>
<head>
  <title>Data Siswa - Versi Tabel</title>
  <style>
    table {
      width: 60%;
      border-collapse: collapse;
      margin: 20px auto;
    }
    th, td {
      border: 1px solid #aaa;
      padding: 10px;
      text-align: center;
    }
    th {
      background-color: #f2f2f2;
    }
  </style>
</head>
<body>
  <h2 style="text-align:center;">Daftar Siswa</h2>
  <table>
    <thead>
      <tr>
        <th>No</th>
        <th>Nama</th>
        <th>Kelas</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>1</td>
        <td>Ani</td>
        <td>10A</td>
      </tr>
      <tr>
        <td>2</td>
        <td>Budi</td>
        <td>10B</td>
      </tr>
      <tr>
        <td>3</td>
        <td>Citra</td>
        <td>10C</td>
      </tr>
    </tbody>
  </table>
</body>
</html>
